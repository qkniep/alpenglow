name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Linting (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/download-data

      - name: Tests
        run: ./test.sh ci

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build (${{ matrix.mode }})
        run: cargo build --all-targets --all-features ${{ matrix.mode == 'release' && '--release' || '' }} --locked

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Cargo audit
        run: cargo audit

      - name: License check
        run: cargo license

      - name: Unused deps
        run: cargo machete

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --locked

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/download-data

      - name: Install llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --lcov --workspace --ignore-filename-regex='(benches|src/bin|src/main.rs)' --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
