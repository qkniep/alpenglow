name: Scorecard

# OSSF Scorecard assesses supply-chain security posture (branch protection,
# pinned actions, token permissions, ...) and publishes results to the
# Scorecard API so you can show a badge. Scheduled runs only fire on the
# default branch.
on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]

# Read-only by default; the analysis job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout (overrides workflow-level permissions, so repeat here)
      security-events: write # Needed to upload results to the code-scanning dashboard.
      id-token: write # Needed for the publish_results provenance attestation.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: results.sarif
