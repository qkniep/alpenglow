name: Coverage

# Test coverage analysis with cargo-llvm-cov, uploaded to Codecov.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/rust-setup
        with:
          tools: nextest,cargo-llvm-cov
      - uses: ./.github/actions/download-data

      - name: Coverage
        run: |
          cargo llvm-cov --lcov --workspace --all-features \
            --ignore-filename-regex='(benches|src/bin|src/main.rs)' \
            --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: lcov.info
          # Keep false: `true` fails CI on fork PRs that can't read the repo
          # secret. Flip to true once coverage runs only on trusted events.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
