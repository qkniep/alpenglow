[package]
name = "alpenglow"
version = "0.1.0"
edition = "2024"
rust-version = "1.90"
authors = ["Quentin Kniep <quentin@anza.xyz>"]
description = "Reference research implementation of the Alpenglow consensus protocol."
license = "Apache-2.0"
repository = "https://github.com/qkniep/alpenglow"
readme = "README.md"
keywords = ["alpenglow", "solana", "consensus", "distributed-systems"]
categories = ["algorithms", "network-programming", "data-structures"]
publish = false

[dependencies]
aes = { version = "0.9", features = ["hazmat", "zeroize"] }
async-trait = "0.1"
bitvec = { version = "1", features = ["serde"] }
blst = { version = "0.3", features = ["serde", "serde-secret"] }
clap = { version = "4", features = ["derive"] }
color-eyre = "0.6"
csv = "1"
ctr = "0.10"
derive_more = { version = "2", features = ["add", "add_assign", "as_ref", "from", "into", "sum"] }
ed25519-zebra = "4"
either = "1"
fastrace = "0.7"
fastrace-opentelemetry = { version = "0.17", optional = true }
futures = "0.3"
hex = "0.4"
hex-literal = "1"
hotpath = "0.16"
log = "0.4"
logforth = { version = "0.29", features = ["append-fastrace", "bridge-log"] }
moka = { version = "0.12", features = ["future"] }
opentelemetry = { version = "0.31", optional = true }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic"], optional = true }
opentelemetry_sdk = { version = "0.31", optional = true }
owo-colors = "4"
rand = "0.10"
rayon = { version = "1", optional = true }
reed-solomon-simd = "3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
smallvec = "1"
static_assertions = "1"
statrs = { version = "0.18", optional = true }
thiserror = "2"
time = { version = "0.3", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
toml = "1"
wincode = { version = "0.5", features = ["derive"] }

[dev-dependencies]
assert_cmd = "2"
divan = "0.1"
mockall = "0.14"
tempfile = "3"

[features]
hotpath = ["hotpath/hotpath"]
hotpath-alloc = ["hotpath/hotpath-alloc"]
simulations = ["dep:rayon", "dep:statrs"]
# Enables `fastrace` span collection and OpenTelemetry (OTLP) export.
# Off by default: Without it, `fastrace` instrumentation compiles to no-ops and
# the gRPC/OTLP dependency stack is dropped entirely.
telemetry = [
    "fastrace/enable",
    "logforth/append-fastrace",
    "dep:fastrace-opentelemetry",
    "dep:opentelemetry",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry_sdk",
]

[lints.rust]
unreachable_pub = "warn"

[lints.clippy]
cast_possible_truncation = "allow"

[profile.release]
debug = true
overflow-checks = true
codegen-units = 1
lto = true

[profile.bench]
codegen-units = 1
lto = true

[[bench]]
name = "crypto"
harness = false

[[bench]]
name = "disseminator"
harness = false

[[bench]]
name = "network"
harness = false

[[bench]]
name = "shredder"
harness = false

[[bench]]
name = "udp_throughput"
harness = false

[[bin]]
name = "simulations"
path = "src/bin/simulations/main.rs"
required-features = ["simulations"]
